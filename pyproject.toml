[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "linker-umi-dex"
version = "0.1.0"
description = "Python-first ORB-SLAM3 + controller capture pipeline"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "matplotlib>=3.7",
    "numpy>=1.24",
    "opencv-python>=4.8",
    "orbslam3-python>=2.0.0",
    "pyrealsense2>=2.57.7.10387",
    "pyserial>=3.5",
    "pytest>=7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.scripts]
orb-run = "linker_umi_dex.orb_runner:main"
align-trajectory = "linker_umi_dex.align:main"
visualize-trajectory = "linker_umi_dex.wrapper.visualize:main"
record-realsense = "linker_umi_dex.record_realsense:main"
record-interactive = "linker_umi_dex.wrapper.interactive_record:main"

[tool.hatch.build.targets.wheel]
packages = ["src/linker_umi_dex"]
