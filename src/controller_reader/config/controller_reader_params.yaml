# =============================================================
# controller_reader_node 参数配置
# =============================================================
# 用法:
#   ros2 launch controller_reader controller_reader.launch.py
#   ros2 launch controller_reader controller_reader.launch.py params_file:=/path/to/custom_params.yaml

controller_reader_node:
  ros__parameters:
    # -------------------- 串口配置 --------------------
    # 串口端口号
    #   Windows: 'COM3', 'COM61'
    #   Linux:   '/dev/ttyUSB0', '/dev/controller_usb'
    serial_port: '/dev/ttyACM0'

    # 串口波特率
    serial_baudrate: 115200

    # 串口读取超时（秒）
    serial_timeout: 0.1

    # -------------------- 滤波配置 --------------------
    # 是否启用低通滤波
    enable_filter: true

    # 滤波系数（0-1），越小越平滑但响应越慢
    filter_alpha: 0.3

    # -------------------- 发布配置 --------------------
    # 是否同时发布原始（未滤波）数据到 controller/angles_raw
    publish_raw: true
